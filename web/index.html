<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealRPG Clothing Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand"><span class="logo">RealRPG</span><small>Clothing Studio v1.2</small></div>
      <div class="tools">
        <button data-tool="new">NEW</button><button data-tool="open">OPEN</button><button id="saveBtn">SAVE</button>
        <button id="undoBtn">UNDO</button><button id="redoBtn">REDO</button>
        <button class="active" data-mode="select">SELECT</button><button data-mode="brush">BRUSH</button><button data-mode="text">TEXT</button>
        <button id="addShapeBtn">SHAPES</button><button id="imageBtn">IMAGE</button><button id="aiBtn">AI</button>
      </div>
      <button id="closeBtn" class="close">&times;</button>
    </header>

    <main class="layout">
      <aside class="library panel">
        <div class="tabs"><button class="tab active" data-tab="library">LIBRARY</button><button class="tab" data-tab="my">MY DESIGNS</button></div>
        <input id="search" placeholder="Search silhouettes..." />
        <div class="categories"></div>
        <div class="gender"><button class="genderBtn active" data-gender="male">MALE</button><button class="genderBtn" data-gender="female">FEMALE</button></div>
        <h4>SILHOUETTES <span id="count"></span></h4>
        <div id="templateGrid" class="gridlist"></div>
        <section class="details">
          <h4>DETAILS</h4>
          <p id="details">No model selected<br/>Choose from the library</p>
          <button id="useTemplate">USE THIS TEMPLATE</button>
        </section>
      </aside>

      <section class="preview panel">
        <h3><span></span> LIVE PREVIEW (3D)</h3>
        <div class="preview3d-viewport" id="preview3dViewport">
          <!-- Transparent area: the game camera is visible through here -->
          <div class="preview3d-overlay" id="preview3dOverlay"></div>
        </div>
        <div class="preview3d-controls">
          <button id="prev3dRotateLeft" title="Forgatás balra">&#x25C0;</button>
          <button id="prev3dAutoRotate" title="Automatikus forgatás">&#x27F3;</button>
          <button id="prev3dRotateRight" title="Forgatás jobbra">&#x25B6;</button>
          <button id="prev3dZoomIn" title="Zoom be">&#x2795;</button>
          <button id="prev3dZoomOut" title="Zoom ki">&#x2796;</button>
          <button id="prev3dReset" title="Reset">&#x21BA;</button>
        </div>
        <div class="preview3d-views">
          <button class="view-btn active" data-view="full">FULL</button>
          <button class="view-btn" data-view="upper">UPPER</button>
          <button class="view-btn" data-view="lower">LOWER</button>
          <button class="view-btn" data-view="feet">FEET</button>
          <button class="view-btn" data-view="head">HEAD</button>
        </div>
        <div class="render-badge" id="renderBadge">RUNTIME</div>
      </section>

      <section class="editor panel">
        <h3>&#x2301; UV EDITOR <small id="activeTemplate">empty - 1024x1024</small></h3>
        <div class="canvasWrap"><canvas id="uvCanvas" width="1024" height="1024"></canvas></div>
        <div class="editorBottom">
          <div class="quick"><button id="gridBtn">GRID</button><button id="mirrorBtn">MIRROR X</button><button id="lockBtn">LOCK UV</button></div>
          <div class="brush-settings hidden" id="brushSettings">
            <label>Size <input id="brushSize" type="range" min="2" max="60" value="12"></label>
            <label>Color <input id="brushColor" type="color" value="#111111"></label>
          </div>
          <div class="aiLine"><b>AI DESIGN</b><input id="aiPrompt" placeholder='Describe your design... e.g. "dragon breathing fire on black"'/><button id="generateAi">GENERATE</button></div>
        </div>
      </section>

      <aside class="layers panel">
        <h3>LAYERS <span id="layerCount">0</span><button id="pasteBtn">Paste</button></h3>
        <div id="layersList" class="layersList"><p class="muted">No layers yet</p></div>
        <section class="props">
          <h4>LAYER PROPERTIES</h4>
          <label>X <input id="propX" type="number" value="0"></label>
          <label>Y <input id="propY" type="number" value="0"></label>
          <label>Rotation <input id="propRot" type="number" value="0"></label>
          <label>Opacity <input id="propOpacity" type="range" min="0" max="1" step="0.01" value="1"></label>
          <label>Blend <select id="propBlend"><option>source-over</option><option>overlay</option><option>multiply</option><option>screen</option><option>darken</option><option>lighten</option></select></label>
        </section>
      </aside>
    </main>

    <footer class="bottombar">
      <div class="barcode">Los Santos Customs &#x258C;&#x258C;&#x258C;&#x258C;&#x258C;&#x258C;</div>
      <button id="exportPackBtn" class="big" style="display:none">EXPORT PACK</button>
      <button id="printBtn" class="big orange">PRINT IT</button>
      <div class="activeDesign"><small>ACTIVE DESIGN</small><b id="designName">Untitled Design</b></div>
      <button id="readyBtn" class="ready">READY TO PRINT</button>
    </footer>

    <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" hidden />

    <!-- In-NUI Modal Dialog (replaces browser prompt()) -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal-box">
        <h4 id="modalTitle">Input</h4>
        <input id="modalInput" type="text" autocomplete="off" />
        <div class="modal-actions">
          <button id="modalCancel">CANCEL</button>
          <button id="modalConfirm">OK</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
