<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealRPG Clothing Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand"><span class="logo">83' RSCD</span><small>Clothing Studio</small></div>
      <div class="tools">
        <button id="newBtn">NEW</button>
        <button class="tabAction active" data-mode="select">SELECT</button>
        <button class="tabAction" data-mode="brush">BRUSH</button>
        <button id="textBtn">TEXT</button>
        <button id="shapeBtn">SHAPES</button>
        <button id="imageBtn">IMAGE</button>
        <button id="saveBtn">SAVE</button>
        <button id="undoBtn">UNDO</button>
        <button id="redoBtn">REDO</button>
        <button id="aiBtn">AI</button>
      </div>
      <button id="closeBtn" class="close">×</button>
    </header>

    <main class="layout">
      <aside class="library panel">
        <div class="tabs">
          <button class="tab active" data-tab="library">LIBRARY</button>
          <button class="tab" data-tab="my">MY DESIGNS</button>
          <button class="tab" data-tab="marketplace">MARKET</button>
        </div>

        <input id="search" placeholder="Search silhouettes..." />

        <div id="libraryFilters">
          <div class="categories">
            <button class="cat active" data-cat="tops">TOPS</button>
            <button class="cat" data-cat="undershirt">UNDER</button>
            <button class="cat" data-cat="pants">PANTS</button>
            <button class="cat" data-cat="shoes">SHOES</button>
          </div>
          <div class="gender">
            <button class="genderBtn active" data-gender="male">MALE</button>
            <button class="genderBtn" data-gender="female">FEMALE</button>
          </div>
        </div>

        <h4 id="leftTitle">SILHOUETTES <span id="count"></span></h4>
        <div id="templateGrid" class="gridlist"></div>

        <section class="details">
          <h4>DETAILS</h4>
          <p id="details">No model selected<br/>Choose from the library</p>
          <button id="useTemplate">USE THIS TEMPLATE</button>
          <button id="loadDesignBtn" class="secondary hidden">LOAD SELECTED DESIGN</button>
          <button id="publishDesignBtn" class="secondary hidden">PUBLISH DESIGN</button>
          <button id="unpublishDesignBtn" class="secondary hidden">UNPUBLISH</button>
          <button id="buyMarketBtn" class="secondary hidden">BUY + PRINT</button>
        </section>
      </aside>

      <section class="preview panel">
        <h3><span></span> LIVE PREVIEW</h3>
        <div class="dummy3d">
          <div id="shirt3d"><div id="shirtDesign"></div></div>
        </div>
      </section>

      <section class="editor panel">
        <h3>⌁ UV EDITOR <small id="activeTemplate">empty - 1024x1024</small></h3>
        <div class="canvasWrap"><canvas id="uvCanvas" width="1024" height="1024"></canvas></div>
        <div class="editorBottom">
          <div class="quick">
            <button id="gridBtn" class="active">GRID</button>
            <button id="mirrorBtn">MIRROR X</button>
            <button id="lockBtn">LOCK UV</button>
          </div>
          <div class="brushLine">
            <label>Color <input id="brushColor" type="color" value="#d7ff00"></label>
            <label>Size <input id="brushSize" type="range" min="2" max="60" value="12"></label>
          </div>
          <div class="aiLine">
            <b>AI DESIGN</b>
            <input id="aiPrompt" placeholder='Describe your design... e.g. "dragon breathing fire on black"'/>
            <button id="generateAi">GENERATE</button>
          </div>
        </div>
      </section>

      <aside class="layers panel">
        <h3>LAYERS <span id="layerCount">0</span><button id="pasteBtn">Paste</button></h3>
        <div id="layersList" class="layersList"><p class="muted">No layers yet</p></div>
        <section class="props">
          <h4>LAYER PROPERTIES</h4>
          <label>X <input id="propX" type="number" value="0"></label>
          <label>Y <input id="propY" type="number" value="0"></label>
          <label>Rotation <input id="propRot" type="number" value="0"></label>
          <label>Opacity <input id="propOpacity" type="range" min="0" max="1" step="0.01" value="1"></label>
          <label>Blend
            <select id="propBlend">
              <option>source-over</option>
              <option>overlay</option>
              <option>multiply</option>
              <option>screen</option>
            </select>
          </label>
          <label>Text <input id="propText" type="text" value=""></label>
          <label>Color <input id="propColor" type="color" value="#d7ff00"></label>
        </section>
      </aside>
    </main>

    <footer class="bottombar">
      <div class="barcode">Los Santos Customs ▌▌▌▌▌▌</div>
      <button id="buildBtn" class="big orange">BUILD IT</button>
      <button id="printBtn" class="big orange2">PRINT IT</button>
      <button id="repBtn" class="big">REP IT</button>
      <div class="activeDesign">
        <small>ACTIVE DESIGN</small>
        <b id="designName">Untitled Design</b>
      </div>
      <button id="readyBtn" class="ready">READY TO PRINT</button>
    </footer>

    <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" hidden />
  </div>
  <script src="app.js"></script>
</body>
</html>
