<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealRPG Clothing Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand"><span class="logo">RealRPG</span><small>Clothing Studio</small></div>
      <div class="tools">
        <button id="newBtn">ÚJ</button>
        <button class="tabAction active" data-mode="select">KIJELÖLÉS</button>
        <button class="tabAction" data-mode="brush">ECSET</button>
        <button id="textBtn">SZÖVEG</button>
        <button id="shapeBtn">ALAKZAT</button>
        <button id="imageBtn">KÉP</button>
        <button id="saveBtn">MENTÉS</button>
        <button id="undoBtn">VISSZA</button>
        <button id="redoBtn">ELŐRE</button>
        <button id="aiBtn">AI</button>
      </div>
      <button id="closeBtn" class="close">&times;</button>
    </header>

    <main class="layout">
      <aside class="library panel">
        <div class="tabs">
          <button class="tab active" data-tab="library">SABLONOK</button>
          <button class="tab" data-tab="my">DESIGNJAIM</button>
          <button class="tab" data-tab="marketplace">PIAC</button>
        </div>

        <input id="search" placeholder="Keresés..." />

        <div id="libraryFilters">
          <div class="categories">
            <button class="cat active" data-cat="tops">FELSŐ</button>
            <button class="cat" data-cat="undershirt">ALSÓING</button>
            <button class="cat" data-cat="pants">NADRÁG</button>
            <button class="cat" data-cat="shoes">CIPŐ</button>
          </div>
          <div class="gender">
            <button class="genderBtn active" data-gender="male">FÉRFI</button>
            <button class="genderBtn" data-gender="female">NŐI</button>
          </div>
        </div>

        <h4 id="leftTitle">SABLONOK <span id="count"></span></h4>
        <div id="templateGrid" class="gridlist"></div>

        <section class="details">
          <h4>RÉSZLETEK</h4>
          <p id="details">Nincs kiválasztva sablon<br/>Válassz a könyvtárból</p>
          <button id="useTemplate">SABLON HASZNÁLATA</button>
          <button id="loadDesignBtn" class="secondary hidden">DESIGN BETÖLTÉSE</button>
          <button id="publishDesignBtn" class="secondary hidden">PUBLIKÁLÁS</button>
          <button id="unpublishDesignBtn" class="secondary hidden">LEVÉTEL</button>
          <button id="buyMarketBtn" class="secondary hidden">MEGVÉTEL + NYOMTATÁS</button>
        </section>
      </aside>

      <section class="preview panel">
        <h3><span></span> ÉLŐ ELŐNÉZET</h3>
        <div class="dummy3d">
          <div id="shirt3d"><div id="shirtDesign"></div></div>
        </div>
      </section>

      <section class="editor panel">
        <h3>UV SZERKESZTŐ <small id="activeTemplate">üres - 1024x1024</small></h3>
        <div class="canvasWrap"><canvas id="uvCanvas" width="1024" height="1024"></canvas></div>
        <div class="editorBottom">
          <div class="quick">
            <button id="gridBtn" class="active">RÁCS</button>
            <button id="mirrorBtn">TÜKRÖZÉS</button>
            <button id="lockBtn">UV ZÁROLÁS</button>
          </div>
          <div class="brushLine">
            <label>Szín <input id="brushColor" type="color" value="#d4a853"></label>
            <label>Méret <input id="brushSize" type="range" min="2" max="60" value="12"></label>
          </div>
          <div class="aiLine">
            <b>AI DESIGN</b>
            <input id="aiPrompt" placeholder="Írd le a designt... pl. &quot;sárkány tüzet fúj fekete háttéren&quot;"/>
            <button id="generateAi">GENERÁLÁS</button>
          </div>
        </div>
      </section>

      <aside class="layers panel">
        <h3>RÉTEGEK <span id="layerCount">0</span><button id="pasteBtn">Beillesztés</button></h3>
        <div id="layersList" class="layersList"><p class="muted">Még nincsenek rétegek</p></div>
        <section class="props">
          <h4>RÉTEG TULAJDONSÁGAI</h4>
          <label>X <input id="propX" type="number" value="0"></label>
          <label>Y <input id="propY" type="number" value="0"></label>
          <label>Forgatás <input id="propRot" type="number" value="0"></label>
          <label>Átlátszóság <input id="propOpacity" type="range" min="0" max="1" step="0.01" value="1"></label>
          <label>Keverés
            <select id="propBlend">
              <option value="source-over">Normál</option>
              <option value="overlay">Átfedés</option>
              <option value="multiply">Szorzás</option>
              <option value="screen">Képernyő</option>
            </select>
          </label>
          <label>Szöveg <input id="propText" type="text" value=""></label>
          <label>Szín <input id="propColor" type="color" value="#d4a853"></label>
        </section>
      </aside>
    </main>

    <footer class="bottombar">
      <div class="barcode">Los Santos Customs ▌▌▌▌▌▌</div>
      <button id="buildBtn" class="big orange">ÉPÍTÉS</button>
      <button id="printBtn" class="big orange2">NYOMTATÁS</button>
      <button id="repBtn" class="big">HÍRNÉV</button>
      <div class="activeDesign">
        <small>AKTÍV DESIGN</small>
        <b id="designName">Névtelen Design</b>
      </div>
      <button id="readyBtn" class="ready">KÉSZ A NYOMTATÁSRA</button>
    </footer>

    <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" hidden />
  </div>
  <script src="app.js"></script>
</body>
</html>
