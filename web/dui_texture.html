<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body, canvas {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
<canvas id="texture" width="1024" height="1024"></canvas>
<script>
const canvas = document.getElementById('texture');
const ctx = canvas.getContext('2d');

function drawImageSource(src, width = 1024, height = 1024) {
  canvas.width = width;
  canvas.height = height;
  ctx.clearRect(0, 0, width, height);

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.clearRect(0, 0, width, height);
    ctx.drawImage(img, 0, 0, width, height);
  };
  img.src = src;
}

window.addEventListener('message', (event) => {
  const data = event.data || {};
  if (data.action === 'setImage' && data.image) {
    drawImageSource(data.image, data.width || 1024, data.height || 1024);
  }
});
</script>
</body>
</html>
